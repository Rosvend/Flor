services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flor
      POSTGRES_USER: flor
      POSTGRES_PASSWORD: flor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flor -d flor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
