[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"

[deploy]
# uvicorn boots the model registry + Chroma collection on startup; the first
# request also triggers lazy model loads, so keep the grace period generous.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway injects PORT; Dockerfile CMD already uses it.
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT}"
