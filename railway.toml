[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"

[deploy]
# uvicorn boots the model registry + Chroma collection on startup; the first
# request also triggers lazy model loads, so keep the grace period generous.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Start command is intentionally omitted — the Dockerfile's CMD wraps uvicorn in
# `sh -c`, which is required so Railway's injected ${PORT} env var is expanded.
# Setting startCommand here overrides the CMD and runs without a shell, so
# uvicorn would receive the literal string "${PORT}" and fail to boot.
